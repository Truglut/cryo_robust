# Global random seed for reproducibility
seed: 42

# Maps to: cfg["data"]
data:
  reference_image_path: "data/simulated/pdb_sourced/proteasome/image_sideview.mrc"
  misclassified_path: "data/simulated/pdb_sourced/proteasome/various_projections_non_sideview.mrcs"

# Maps to: cfg["generation"]
generation:
  n_copies: 800                      # Number of good/inlier copies
  n_copies_rotated: 200              # Number of heavily rotated outliers
  n_misclassified: 0                 # Number of structural outliers
  max_rotation_reference: 2.5        # Max degrees of rotation for good copies
  min_rotation_very_rotated: 45.0    # Min degrees for rotated outliers
  max_rotation_very_rotated: 135.0   # Max degrees for rotated outliers

# Maps to: cfg["noise"]
noise:
  snr: 0.01                           # Signal-to-noise ratio
  # noise_std: 1.0                    # Uncomment and comment out 'snr' to use explicit std instead

mask:
  type: "circular"
  params:
    radius: 48