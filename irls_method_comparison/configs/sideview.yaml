# Global random seed for reproducibility
seed: 42

# Maps to: cfg["data"]
data:
  reference_image_path: "data/simulated/pdb_sourced/proteasome/image_sideview.mrc"
  misclassified_path: "data/simulated/pdb_sourced/proteasome/various_projections_non_sideview.mrcs"

# Maps to: cfg["generation"]
generation:
  n_copies: 800                      # Number of good/inlier copies
  n_copies_rotated: 200              # Number of heavily rotated outliers
  n_misclassified: 0                 # Number of structural outliers
  max_rotation_reference: 2.5        # Max degrees of rotation for good copies
  min_rotation_very_rotated: 45.0    # Min degrees for rotated outliers
  max_rotation_very_rotated: 135.0   # Max degrees for rotated outliers

# Maps to: cfg["noise"]
noise:
  snr: 0.01                           # Signal-to-noise ratio
  # noise_std: 1.0                    # Uncomment and comment out 'snr' to use explicit std instead

mask:
  type: "circular"
  params:
    radius: 48

# Maps to: cfg["experiment"]
experiment:
  methods:
    - name: "beta_m_estimator 1e-6"
      type: "m_estimator"
      params:
        weight_function: "global"
        weight_params:
          beta: 0.000001
        max_iter: 75

    - name: "beta_m_estimator 5e-7"
      type: "m_estimator"
      params:
        weight_function: "global"
        weight_params:
          beta: 0.0000005
        max_iter: 75

    - name: "beta_m_estimator 1e-7"
      type: "m_estimator"
      params:
        weight_function: "global"
        weight_params:
          beta: 0.0000001
        max_iter: 75
    
    - name: "beta_m_estimator 1e-8"
      type: "m_estimator"
      params:
        weight_function: "global"
        weight_params:
          beta: 1.0e-8
        max_iter: 75

    # --- GMM Estimators ---
    - name: "gmm_standard_l2"
      type: "gmm"
      params:
        distance_function: "l2"      # Matches "l2" in FUNCTION_REGISTRY
        distance_params: {}          # Pass kwargs to distance func here if needed
        random_state: 42

    - name: "recursive_gmm_l1 (20 its)"
      type: "recursive_gmm"
      params:
        distance_function: "l1"      # Matches "l1" in FUNCTION_REGISTRY
        distance_params: {}
        random_state: 42
        max_iter: 20
        tol: 1.0e-3

    - name: "recursive_gmm_l2 (20 its)"
      type: "recursive_gmm"
      params:
        distance_function: "l2"      # Matches "l2" in FUNCTION_REGISTRY
        distance_params: {}
        random_state: 42
        max_iter: 20
        tol: 1.0e-3